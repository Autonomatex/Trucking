kind = "web"
previewPath = "/enterprise/"
title = "Autonomatex Enterprise"
version = "1.0.0"
id = "artifacts/enterprise"
router = "path"

[[services]]
name = "web"
paths = [ "/enterprise/" ]
localPort = 21530

[services.development]
run = "pnpm --filter @workspace/enterprise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/enterprise", "run", "build" ]
serve = "static"
publicDir = "artifacts/enterprise/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21530"
BASE_PATH = "/enterprise/"
