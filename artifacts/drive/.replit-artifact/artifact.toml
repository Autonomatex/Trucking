kind = "web"
previewPath = "/drive/"
title = "Autonomatex Drive"
version = "1.0.0"
id = "artifacts/drive"
router = "path"

[[services]]
name = "web"
paths = [ "/drive/" ]
localPort = 20160

[services.development]
run = "pnpm --filter @workspace/drive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drive", "run", "build" ]
serve = "static"
publicDir = "artifacts/drive/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20160"
BASE_PATH = "/drive/"
